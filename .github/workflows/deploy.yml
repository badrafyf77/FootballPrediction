name: CI/CD Pipeline

on:
  push:
    branches: [ main, integration/final-merge ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BACKEND_IMAGE: moerad/football-backend
  FRONTEND_IMAGE: moerad/football-frontend

jobs:

  # ─────────────────────────
  # JOB 1 — TEST BACKEND
  # ─────────────────────────
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/backend/requirements.txt
          pip install pytest httpx==0.24.1 starlette==0.27.0

      - name: Run tests
        run: |
          cd app/backend
          pytest test_api.py -v

  # ─────────────────────────
  # JOB 2 — BUILD & PUSH BACKEND
  # ─────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: test
    if: contains(fromJSON('["refs/heads/main","refs/heads/integration/final-merge"]'), github.ref) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            moerad/football-backend:latest
            moerad/football-backend:sha-${{ github.sha }}

  # ─────────────────────────
  # JOB 3 — BUILD & PUSH FRONTEND
  # ─────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    if: contains(fromJSON('["refs/heads/main","refs/heads/integration/final-merge"]'), github.ref) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            moerad/football-frontend:latest
            moerad/football-frontend:sha-${{ github.sha }}

  # ─────────────────────────
  # JOB 4 — DEPLOY TO KUBERNETES
  # ─────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: contains(fromJSON('["refs/heads/main","refs/heads/integration/final-merge"]'), github.ref) && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/backend-deployment.yaml
          kubectl apply -f kubernetes/backend-service.yaml
          kubectl apply -f kubernetes/frontend-deployment.yaml
          kubectl apply -f kubernetes/frontend-service.yaml

      - name: Update images
        run: |
          kubectl set image deployment/backend \
            backend=moerad/football-backend:sha-${{ github.sha }} \
            -n default
          kubectl set image deployment/frontend \
            frontend=moerad/football-frontend:sha-${{ github.sha }} \
            -n default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n default --timeout=300s
          kubectl rollout status deployment/frontend -n default --timeout=300s

      - name: Smoke test in cluster
        run: |
          kubectl run smoke-backend --rm -i --restart=Never --image=curlimages/curl:8.7.1 -- \
            curl -fsS http://backend:7860/health
          kubectl run smoke-frontend --rm -i --restart=Never --image=curlimages/curl:8.7.1 -- \
            curl -fsS http://frontend-service/health