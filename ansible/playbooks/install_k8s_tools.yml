---
- hosts: k8s
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Configurer le depot Kubernetes v1.29
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key

    - name: Installer outils K8s
      shell: dnf install -y kubelet kubeadm kubectl --disableexcludes=kubernetes

    - name: Activer Kubelet
      service:
        name: kubelet
        enabled: yes
        state: started

    - name: Charger les modules noyaux K8s
      shell: |
        modprobe br_netfilter
        modprobe overlay

    - name: Configurer sysctl pour le bridge reseau
      shell: |
        echo "net.bridge.bridge-nf-call-iptables = 1" > /etc/sysctl.d/k8s.conf
        echo "net.ipv4.ip_forward = 1" >> /etc/sysctl.d/k8s.conf
        sysctl --system

    - name: Desactiver le Swap
      shell: swapoff -a