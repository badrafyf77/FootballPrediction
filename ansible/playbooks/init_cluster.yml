---
- hosts: master
  become: yes
  tasks:
    - name: Recuperer le token IMDSv2
      shell: |
        curl -s -X PUT "http://169.254.169.254/latest/api/token" \
        -H "X-aws-ec2-metadata-token-ttl-seconds: 21600"
      register: imds_token

    - name: Recuperer l IP publique du master
      shell: |
        curl -s -H "X-aws-ec2-metadata-token: {{ imds_token.stdout }}" \
        http://169.254.169.254/latest/meta-data/public-ipv4
      register: public_ip

    - name: Initialiser le Master Kubernetes
      shell: >
        kubeadm init
        --pod-network-cidr=10.244.0.0/16
        --cri-socket unix:///run/containerd/containerd.sock
        --apiserver-cert-extra-sans={{ public_ip.stdout }}
      register: init_output

    - name: Creer le dossier .kube pour ec2-user
      shell: |
        mkdir -p /home/ec2-user/.kube
        cp -i /etc/kubernetes/admin.conf /home/ec2-user/.kube/config
        chown ec2-user:ec2-user /home/ec2-user/.kube/config

    - name: Mettre a jour kubeconfig avec IP publique
      replace:
        path: /home/ec2-user/.kube/config
        regexp: 'https://172\.\d+\.\d+\.\d+:6443'
        replace: "https://{{ public_ip.stdout }}:6443"

    - name: Attendre que l API Server soit pret
      wait_for:
        host: "{{ ansible_host }}"
        port: 6443
        delay: 10
        timeout: 120

    - name: Installer Flannel
      become_user: ec2-user
      shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

    - name: Generer la commande de join
      shell: kubeadm token create --print-join-command
      register: join_command

- hosts: worker
  become: yes
  tasks:
    - name: Rejoindre le cluster
      shell: "{{ hostvars[groups['master'][0]]['join_command'].stdout }} --cri-socket unix:///run/containerd/containerd.sock"
