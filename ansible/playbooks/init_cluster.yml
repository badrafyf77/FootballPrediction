---
- hosts: master
  become: yes
  tasks:
    - name: Initialiser le Master Kubernetes
      shell: kubeadm init --pod-network-cidr=10.244.0.0/16
      register: init_output
      ignore_errors: yes

    - name: Creer le dossier .kube pour ec2-user
      shell: |
        mkdir -p /home/ec2-user/.kube
        cp -i /etc/kubernetes/admin.conf /home/ec2-user/.kube/config
        chown ec2-user:ec2-user /home/ec2-user/.kube/config

    - name: Attendre que l API Server soit pret (Port 6443)
      wait_for:
        host: "{{ ansible_host }}"
        port: 6443
        delay: 10
        timeout: 60

    - name: Installer le reseau Pod Flannel
      become_user: ec2-user
      shell: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml --validate=false

    - name: Generer la commande de join pour le worker
      shell: kubeadm token create --print-join-command
      register: join_command

- hosts: worker
  become: yes
  tasks:
    - name: Rejoindre le cluster
      shell: "{{ hostvars[groups['master'][0]]['join_command'].stdout }}"
      ignore_errors: yes